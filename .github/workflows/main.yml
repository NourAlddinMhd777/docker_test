name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2        
          
      - name: Run SSH commands to pull changes
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          USERNAME: ${{ secrets.USERNAME }}
        run: |
          # إعداد مجلد .ssh
          mkdir -p ~/.ssh
          # إضافة مفتاح SSH الخاص
          echo -e "${SSH_KEY//\\n/$'\n'}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # إضافة الخادم إلى known_hosts
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          # تنفيذ الأوامر على الخادم
          ssh -o StrictHostKeyChecking=no $USERNAME@$SERVER_IP << 'EOF'
            docker exec 96170f26ba68 bash -c "
            cd docker_test && \
            git pull origin main && \
            kill -HUP \$(pgrep gunicorn)
            "
          EOF
